server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pallet-deposit-system

  datasource:
    driver-class-name: org.h2.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/pallet_db;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.pallet.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

pallet:
  deposit:
    default-amount: ${PALLET_DEPOSIT_DEFAULT_AMOUNT:100.00}
    damaged-rate: ${PALLET_DEPOSIT_DAMAGED_RATE:0.50}
    lost-rate: ${PALLET_DEPOSIT_LOST_RATE:1.00}
